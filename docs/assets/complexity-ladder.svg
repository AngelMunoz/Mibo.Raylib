<svg width="600" height="520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- refX=10 puts the tip of the triangle at the line's end coordinate -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#666" />
    </marker>
  </defs>

  <!-- Level 1 -->
  <rect x="50" y="20" width="180" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="140" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="black">Level 1: Basic Rendering</text>
  <text x="140" y="55" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Mesh on screen</text>
  <text x="140" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Transforms, Clear buffer</text>

  <!-- Level 2 -->
  <rect x="50" y="95" width="180" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="140" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="black">Level 2: Materials &amp; Textures</text>
  <text x="140" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">PBR system, Maps</text>
  <text x="140" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Material reuse</text>

  <!-- Level 3 -->
  <rect x="50" y="170" width="180" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="140" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="black">Level 3: Scene Organization</text>
  <text x="140" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Fluent DSL</text>
  <text x="140" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Batch rendering</text>

  <!-- Level 4 -->
  <rect x="50" y="245" width="180" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="140" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="black">Level 4: Lighting</text>
  <text x="140" y="280" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Directional, Point, Spot</text>
  <text x="140" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Multiple lights</text>

  <!-- Level 5 -->
  <rect x="50" y="320" width="180" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="140" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="black">Level 5: Shadows</text>
  <text x="140" y="355" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Shadow atlas</text>
  <text x="140" y="370" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Cascaded shadows</text>

  <!-- Level 6 -->
  <rect x="50" y="395" width="180" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="140" y="415" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="black">Level 6: Custom Effects</text>
  <text x="140" y="430" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Shader overrides</text>
  <text x="140" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Raw device access</text>

  <!-- Level 7 -->
  <rect x="350" y="245" width="180" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="440" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="black">Level 7: Advanced</text>
  <text x="440" y="280" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">PreRender callbacks</text>
  <text x="440" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Performance tuning</text>

  <!-- Arrows between levels (vertical) - Added 2px padding to avoid bleeding -->
  <line x1="140" y1="82" x2="140" y2="93" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="157" x2="140" y2="168" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="232" x2="140" y2="243" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="307" x2="140" y2="318" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="382" x2="140" y2="393" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Horizontal arrow from Level 6 to Level 7 - Added padding to avoid bleeding -->
  <path d="M 232 425 L 290 425 L 290 275 L 348 275" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

</svg>
