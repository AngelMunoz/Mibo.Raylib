<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- refX=10 puts the tip of the triangle at the line's end coordinate -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#666" />
    </marker>
  </defs>

  <!-- draw { } box -->
  <rect x="50" y="20" width="150" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="125" y="40" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="black">draw { }</text>
  <text x="125" y="55" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="black">(Create Drawable)</text>
  <text x="125" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Returns Drawable voption</text>

  <!-- Fluent API box -->
  <rect x="50" y="110" width="150" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="125" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="black">Fluent DSL</text>
  <text x="125" y="145" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="black">(Submit Commands)</text>
  <text x="125" y="160" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">Stores RenderCommand[]</text>

  <!-- RenderBuffer box -->
  <rect x="50" y="200" width="150" height="40" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="125" y="225" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="black">RenderBuffer (Queue)</text>

  <!-- Pipeline box -->
  <rect x="50" y="270" width="150" height="80" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="125" y="290" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="black">Pipeline (Execute)</text>
  <text x="125" y="305" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">- Culling</text>
  <text x="125" y="320" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">- Shadow pass</text>
  <text x="125" y="335" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">- Batching</text>
  <text x="125" y="350" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">- Main pass</text>

  <!-- Screen box -->
  <rect x="350" y="290" width="150" height="40" rx="8" ry="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="425" y="315" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="black">Screen</text>

  <!-- Arrows with 2px padding to prevent bleeding -->
  <line x1="125" y1="82" x2="125" y2="108" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="125" y1="172" x2="125" y2="198" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="125" y1="242" x2="125" y2="268" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="202" y1="310" x2="348" y2="310" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

</svg>